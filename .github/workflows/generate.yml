name: Generate

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: actions

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4
        with:
          ref: workflow
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: generate
        env:
          CURRENCYAPI_KEY: ${{ vars.CURRENCYAPI_KEY }}
          COINGECKO_KEY: ${{ vars.COINGECKO_KEY }}
          OPENEXCHANGERATES_KEY: ${{ vars.OPENEXCHANGERATES_KEY }}
          CURRENCYLAYER_KEY: ${{ vars.CURRENCYLAYER_KEY }}
        run: npx tsx src/index.ts

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: notreeceharris/live-exchange-rate
          ref: main
          path: target-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy all generated files to target repository
        run: |
          # Copy everything from out directory recursively
          cp -r out/* target-repo/latest/

          # Remove the out directory itself if it gets copied
          rm -rf target-repo/latest/out

      - name: Commit and push all changes
        run: |
          cd target-repo

          # Add all files (new, modified, deleted)
          git add -A

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Get list of changed files for commit message
            CHANGED_FILES=$(git diff --name-only --staged | head -10 | tr '\n' ', ' | sed 's/, $//')
            COMMIT_MSG="Update domain lists - $(date +'%Y-%m-%d %H:%M:%S')"

            git commit -m "$COMMIT_MSG"
            git push
          fi
